<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="hexGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#F2B544"/>
      <stop offset="100%" stop-color="#CC8800"/>
    </linearGradient>
    <linearGradient id="bodyGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#E8A322"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="80"/>

  <!-- Hexagon frame (rotated 90deg - diamond orientation like logo) -->
  <g filter="url(#glow)" transform="translate(256,210)">
    <polygon points="0,-145 125,-72 125,72 0,145 -125,72 -125,-72"
      fill="none" stroke="url(#hexGold)" stroke-width="14"
      transform="rotate(30)"
      stroke-linejoin="round"/>
  </g>

  <!-- Wings - left -->
  <ellipse cx="148" cy="195" rx="88" ry="42"
    fill="none" stroke="#F2B544" stroke-width="3" opacity="0.7"
    transform="rotate(-30,148,195)"/>
  <ellipse cx="148" cy="195" rx="60" ry="28"
    fill="#1a1500" stroke="#F2B544" stroke-width="1.5" opacity="0.5"
    transform="rotate(-30,148,195)"/>

  <!-- Wings - right -->
  <ellipse cx="364" cy="195" rx="88" ry="42"
    fill="none" stroke="#F2B544" stroke-width="3" opacity="0.7"
    transform="rotate(30,364,195)"/>
  <ellipse cx="364" cy="195" rx="60" ry="28"
    fill="#1a1500" stroke="#F2B544" stroke-width="1.5" opacity="0.5"
    transform="rotate(30,364,195)"/>

  <!-- Bee body -->
  <g filter="url(#softglow)">
    <!-- Abdomen stripes -->
    <ellipse cx="256" cy="260" rx="62" ry="82" fill="#111111"/>
    <ellipse cx="256" cy="230" rx="58" ry="20" fill="#F2B544"/>
    <ellipse cx="256" cy="265" rx="60" ry="20" fill="#F2B544"/>
    <ellipse cx="256" cy="300" rx="54" ry="18" fill="#F2B544"/>
    <!-- Body outline -->
    <ellipse cx="256" cy="260" rx="62" ry="82" fill="none" stroke="#F2B544" stroke-width="3"/>
  </g>

  <!-- Head -->
  <circle cx="256" cy="168" r="52" fill="#111111" stroke="#F2B544" stroke-width="3"/>

  <!-- Eyes -->
  <ellipse cx="236" cy="162" rx="14" ry="16" fill="#F2B544"/>
  <ellipse cx="276" cy="162" rx="14" ry="16" fill="#F2B544"/>
  <ellipse cx="236" cy="163" rx="7" ry="8" fill="#1a0a00"/>
  <ellipse cx="276" cy="163" rx="7" ry="8" fill="#1a0a00"/>
  <!-- Eye glow -->
  <ellipse cx="233" cy="159" rx="4" ry="4" fill="#FFD700" opacity="0.8"/>
  <ellipse cx="273" cy="159" rx="4" ry="4" fill="#FFD700" opacity="0.8"/>

  <!-- Antennae -->
  <line x1="242" y1="120" x2="220" y2="88" stroke="#F2B544" stroke-width="4" stroke-linecap="round"/>
  <circle cx="216" cy="83" r="7" fill="#F2B544"/>
  <line x1="270" y1="120" x2="292" y2="88" stroke="#F2B544" stroke-width="4" stroke-linecap="round"/>
  <circle cx="296" cy="83" r="7" fill="#F2B544"/>

  <!-- Stinger -->
  <polygon points="256,342 246,360 266,360" fill="#F2B544"/>
</svg>
